<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FlyMilhas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: var(--space-md);
        }
        
        .login-card {
            background: var(--bg-primary);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            padding: var(--space-3xl);
            width: 100%;
            max-width: 400px;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .login-header {
            text-align: center;
            margin-bottom: var(--space-2xl);
        }
        
        .login-logo {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-inverse);
            font-weight: 700;
            font-size: var(--text-2xl);
            margin: 0 auto var(--space-lg);
        }
        
        .login-title {
            font-size: var(--text-3xl);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-sm);
        }
        
        .login-subtitle {
            font-size: var(--text-base);
            color: var(--text-secondary);
        }
        
        .login-form {
            margin-bottom: var(--space-xl);
        }
        
        .login-footer {
            text-align: center;
            padding-top: var(--space-lg);
            border-top: 1px solid var(--border-light);
        }
        
        .login-footer p {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-sm);
        }
        
        .login-footer a {
            color: var(--primary);
            font-weight: 500;
            text-decoration: none;
            transition: color var(--transition-fast);
        }
        
        .login-footer a:hover {
            color: var(--primary-dark);
        }
        
        .forgot-password {
            text-align: right;
            margin-top: var(--space-sm);
        }
        
        .forgot-password a {
            font-size: var(--text-sm);
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        
        .forgot-password a:hover {
            color: var(--primary-dark);
        }
        
        .social-login {
            margin-top: var(--space-lg);
        }
        
        .social-divider {
            display: flex;
            align-items: center;
            margin: var(--space-lg) 0;
            color: var(--text-tertiary);
            font-size: var(--text-sm);
        }
        
        .social-divider::before,
        .social-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-light);
        }
        
        .social-divider span {
            padding: 0 var(--space-md);
        }
        
        .btn-google {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-medium);
            width: 100%;
            justify-content: center;
            gap: var(--space-sm);
        }
        
        .btn-google:hover {
            background-color: var(--gray-50);
            border-color: var(--border-dark);
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: var(--space-xl);
                margin: var(--space-md);
            }
            
            .login-title {
                font-size: var(--text-2xl);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">FM</div>
                <h1 class="login-title">Bem-vindo de volta</h1>
                <p class="login-subtitle">Entre na sua conta FlyMilhas</p>
            </div>
            
            <form class="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">E-mail</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        class="form-input" 
                        placeholder="seu@email.com"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Senha</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="••••••••"
                        required
                    >
                </div>
                
                <div class="forgot-password">
                    <a href="#" onclick="alert('Funcionalidade será implementada com n8n')">Esqueceu sua senha?</a>
                </div>
                
                <div class="form-group" style="margin-top: var(--space-xl);">
                    <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">
                        Entrar
                    </button>
                </div>
            </form>
            
            <div class="social-login">
                <div class="social-divider">
                    <span>ou continue com</span>
                </div>
                
                <button type="button" class="btn btn-google" onclick="alert('Login social será implementado com n8n')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continuar com Google
                </button>
            </div>
            
            <div class="login-footer">
                <p>Não tem uma conta?</p>
                <a href="#" onclick="alert('Registro será implementado com n8n')">Criar conta gratuita</a>
            </div>
        </div>
    </div>
    
    <script>
        // Simular login para demonstração
        document.querySelector('.login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Simular loading
                const submitBtn = document.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<span class="loading"></span> Entrando...';
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    alert('Login simulado com sucesso! Redirecionando para o dashboard...');
                    window.location.href = 'index.html';
                }, 2000);
            }
        });
    </script>
</body>
</html>
